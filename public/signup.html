<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - CronWatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span>Cron<strong>Watch</strong></span>
      </a>
      <div class="auth-byline">by Priya Yadav</div>

      <h1>Create your account</h1>
      <p class="auth-sub">Start monitoring your cron jobs in under a minute</p>

      <div id="errorMsg" class="auth-error hidden"></div>

      <form id="signupForm" autocomplete="off">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Priya Yadav" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loading hidden">Creating...</span>
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('cw_token')) {
      window.location.href = '/dashboard';
    }

    var form = document.getElementById('signupForm');
    var errorMsg = document.getElementById('errorMsg');
    var submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!name || !email || !password) { showError('Please fill in all fields'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters'); return; }

      setLoading(true);

      fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, password: password })
      })
      .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
      .then(function(result) {
        setLoading(false);
        if (!result.ok) { showError(result.data.error); return; }
        localStorage.setItem('cw_token', result.data.token);
        localStorage.setItem('cw_user', JSON.stringify(result.data.user));
        window.location.href = '/dashboard';
      })
      .catch(function() { setLoading(false); showError('Network error. Please try again.'); });
    });

    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); }
    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.querySelector('.btn-text').classList.toggle('hidden', on);
      submitBtn.querySelector('.btn-loading').classList.toggle('hidden', !on);
    }
  </script>
</body>
</html>
